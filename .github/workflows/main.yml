name: publish

on:
  workflow_dispatch:

jobs:
  publish-server:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Get package version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: cargo build --release ${{ matrix.args }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/iceserver \
             target/${{ matrix.target }}/release/iceserver-v${{ steps.version.outputs.version }}-${{ matrix.target }}
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: iceserver-v${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/iceserver-v${{ steps.version.outputs.version }}-${{ matrix.target }}
